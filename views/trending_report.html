<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; background: #f5f5f5; margin: 0; padding: 24px; }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e5e5; font-size: 14px; }
  th { background: #fafafa; }
  a { color: #cc0000; text-decoration: none; }
  .views { text-align: right; white-space: nowrap; }
</style>
</head>
<body>
  <h2>YouTube Trending — Top {{ videos|length }}</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Channel</th>
        <th>Category</th>
        <th class="views">Views</th>
      </tr>
    </thead>
    <tbody>
      {% for video in videos %}
      <tr>
        <td>{{ loop.index }}</td>
        <td><a href="{{ video.url }}">{{ video.title }}</a></td>
        <td>{{ video.channel_title }}</td>
        <td>{{ video.category_name or "—" }}</td>
        <td class="views">{{ "{:,}".format(video.view_count) if video.view_count is not none else "—" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
