<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Trending — Login</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    form { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); width: 280px; }
    input { width: 100%; padding: 8px; margin: 8px 0 16px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #cc0000; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .flash { color: #cc0000; margin-bottom: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <form method="post">
    <h2>Login</h2>
    {% with messages = get_flashed_messages() %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <label>Username</label>
    <input type="text" name="username" autofocus required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Log in</button>
  </form>
</body>
</html>
